<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oleksii Burlaka | Game Developer Portfolio</title>
  <meta name="description" content="Portfolio of Oleksii Burlaka, expert Game Developer with 4+ years of experience crafting Unity and WebGL games.">
  <link rel="icon" type="image/png" href="assets/LogoOBStudio.png">
  <link rel="stylesheet" href="styles.css">
  <!-- Load Configuration First -->
  <script src="config.js" defer></script>
  <!-- Load Main Logic -->
  <script src="main.js" defer></script>
</head>
<body>

  <!-- Ambient Animated Mesh Gradient -->
  <div class="bg-ambient">
    <div class="bg-glow-blob blob-1"></div>
    <div class="bg-glow-blob blob-2"></div>
    <div class="bg-glow-blob blob-3"></div>
  </div>

  <main>
    <!-- Hero Section -->
    <section id="hero">
      <div class="hero-container glass-panel">
        <span id="hero-specialization" class="hero-tag">Game Developer</span>
        <h1 id="hero-name" class="hero-title">Oleksii Burlaka</h1>
        <p id="hero-subtitle" class="hero-subtitle">
          Loading portfolio details...
        </p>
        <button id="btn-explore-projects" class="btn-explore">
          <span>Explore Projects</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 3.33331V12.6666M8 12.6666L12.6667 7.99998M8 12.6666L3.33333 7.99998" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects">
      <div class="section-header">
        <span class="section-subtitle">My Arsenal</span>
        <h2 class="section-title">Selected Works</h2>
        <div class="header-line"></div>
      </div>
      <div id="projects-grid" class="projects-grid">
        <!-- Project cards will be injected here dynamically -->
      </div>
    </section>

  </main>

</body>
</html>
